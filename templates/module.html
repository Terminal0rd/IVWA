<!DOCTYPE html>
<html>
<head>
    <title>Module</title>
</head>
<body>

    <h1>{{ module_name }}</h1>

    <div style="display: flex; gap: 50px;">

        <!-- LEFT SIDE -->
        <div>
            <h2>Story</h2>
            <p>Something suspicious is happening inside the system...</p>

            <button>Hint</button>
        </div>

        <!-- RIGHT SIDE -->
        <div>
            <h2>Login</h2>

            <form method="POST">
                <input type="text" name="username" placeholder="Username"><br><br>
                <input type="password" name="password" placeholder="Password"><br><br>
                <button type="submit">Login</button>
            </form>

            <p>{{ message }}</p>
        </div>

    </div>

</body>
</html>
